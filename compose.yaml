version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: market_user
      POSTGRES_PASSWORD: market_password
      POSTGRES_DB: stock-market-db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U market_user -d stock-market-db"]
      interval: 3s
      timeout: 3s
      retries: 5

  app:
    build: .
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/stock-market-db
      SPRING_DATASOURCE_USERNAME: market_user
      SPRING_DATASOURCE_PASSWORD: market_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
    deploy:
      replicas: 3
      restart_policy:
        condition: any # Automatically recreate if instance dies
    depends_on:
      db:
        condition: service_healthy

  load_balancer:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${APP_PORT:-8080}:80" # Binds to the port provided by the startup script
    depends_on:
      - app