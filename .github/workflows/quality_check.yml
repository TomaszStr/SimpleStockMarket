name: "Quality Suite"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push tags and create releases
      pull-requests: write # Required for Sonar to comment on PRs
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle 9.4.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.4.1

      - name: Build & Quality Check
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: ./gradlew build check sonar --parallel

      - name: Upload Quality Reports
        if: always() # Catch both success and failure
        uses: actions/upload-artifact@v4
        with:
          name: full-quality-reports
          path: |
            build/reports/tests/test
            build/reports/checkstyle
            build/reports/jacoco/test/html

      - name: Create Release Tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"
          ./gradlew release
          git push origin --tags