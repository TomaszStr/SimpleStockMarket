events {
    worker_connections 1024;
}

http {
    server {
        listen 80;

        location / {
            # Docker's internal DNS automatically load balances requests
            # across all replicas of the 'app' service.
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Fast timeouts so if an instance dies during a request,
            # Nginx quickly retries another replica.
            proxy_connect_timeout 2s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
        }
    }
}